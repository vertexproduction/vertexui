<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:#0d1117;
    color:white;
}

/* Header */
header{
    background:#161b22;
    padding:18px;
    border-bottom:1px solid #30363d;
}

.nav{
    display:flex;
    justify-content:center;
    gap:40px;
}

.nav button{
    background:none;
    border:none;
    color:#c9d1d9;
    font-size:16px;
    cursor:pointer;
    padding:8px 16px;
    border-radius:6px;
    transition:.2s;
}

.nav button.active,
.nav button:hover{
    background:#238636;
    color:white;
}

/* Pages */
.page{
    display:none;
    padding:30px;
}

.page.active{
    display:block;
}

/* Browse */
.search-container{
    max-width:600px;
    margin:0 auto 20px;
}

.search-container input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#21262d;
    color:white;
    font-size:15px;
}

.filters{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.filter-btn{
    background:#21262d;
    border:1px solid #30363d;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
}

.filter-btn.active{
    background:#238636;
}

/* Cards */
.games-grid{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    width:320px;
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    overflow:hidden;
    display:none;
}

.card.visible{
    display:block;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:16px;
}

.card h3{
    margin-bottom:8px;
}

.tags{
    display:flex;
    gap:8px;
    margin-top:12px;
}

.tag{
    background:#238636;
    padding:4px 8px;
    border-radius:5px;
    font-size:12px;
}
</style>
</head>
<body>

<header>
    <div class="nav">
        <button class="tab active" data-page="home">Home</button>
        <button class="tab" data-page="browse">Browse</button>
    </div>
</header>

<!-- HOME -->
<div id="home" class="page active">
    <h1 style="text-align:center;">Welcome</h1>
    <p style="text-align:center;margin-top:10px;color:#8b949e;">
        Discover game builds and scripts.
    </p>
</div>

<!-- BROWSE -->
<div id="browse" class="page">

    <div class="search-container">
        <input
            type="text"
            id="search"
            placeholder="Search by game ID..."
        >
    </div>

    <div class="filters">
        <button class="filter-btn">Trusted</button>
        <button class="filter-btn">Most Viewed</button>
        <button class="filter-btn">Most Liked</button>
        <button class="filter-btn">Key</button>
        <button class="filter-btn">Keyless</button>
    </div>

    <div class="games-grid">

        <div
            class="card"
            id="ringFarmCard"
            data-id="107646426076756"
        >
            <img src="https://via.placeholder.com/320x180?text=Build+a+Ring+Farm">

            <div class="card-content">
                <h3>Build a Ring Farm</h3>

                <p style="color:#8b949e;">
                    Game ID: 107646426076756
                </p>

                <div class="tags">
                    <span class="tag">Trusted</span>
                    <span class="tag">Keyless</span>
                </div>
            </div>
        </div>

    </div>

</div>

<script>

/* Tabs */
document.querySelectorAll(".tab").forEach(button => {
    button.addEventListener("click", () => {

        document.querySelectorAll(".tab")
            .forEach(btn => btn.classList.remove("active"));

        document.querySelectorAll(".page")
            .forEach(page => page.classList.remove("active"));

        button.classList.add("active");

        document
            .getElementById(button.dataset.page)
            .classList.add("active");
    });
});

/* Search */
const searchInput = document.getElementById("search");
const card = document.getElementById("ringFarmCard");

searchInput.addEventListener("input", () => {

    const value = searchInput.value.trim();

    if(value === "107646426076756"){
        card.classList.add("visible");
    } else {
        card.classList.remove("visible");
    }
});

/* Filter UI Toggle */
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        btn.classList.toggle("active");
    });
});

</script>

</body>
</html>
