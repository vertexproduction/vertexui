<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0b1120;
    --card:#111827;
    --glass:rgba(255,255,255,.05);
    --border:rgba(255,255,255,.08);
    --primary:#2563eb;
    --text:#ffffff;
    --muted:#94a3b8;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#2563eb40,transparent 35%),
    radial-gradient(circle at bottom right,#7c3aed40,transparent 35%);
    z-index:-1;
}

/* NAVBAR */

.navbar{
    position:sticky;
    top:0;
    z-index:100;
    display:flex;
    justify-content:center;
    padding:18px;
    backdrop-filter:blur(20px);
    background:rgba(8,12,22,.75);
    border-bottom:1px solid var(--border);
}

.nav-links{
    display:flex;
    gap:14px;
}

.nav-btn{
    border:none;
    background:transparent;
    color:var(--muted);
    padding:10px 22px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    transition:.25s;
}

.nav-btn:hover,
.nav-btn.active{
    background:var(--primary);
    color:white;
}

/* PAGES */

.page{
    display:none;
}

.page.active{
    display:block;
}

/* HOME */

.hero{
    max-width:1200px;
    margin:auto;
    text-align:center;
    padding:120px 25px;
}

.hero h1{
    font-size:4rem;
    font-weight:800;
    margin-bottom:15px;
}

.hero p{
    color:var(--muted);
    font-size:1.15rem;
}

/* BROWSE */

.browse-wrapper{
    max-width:1500px;
    margin:auto;
    padding:30px;
}

.search-box{
    max-width:700px;
    margin:0 auto 30px;
}

.search-box input{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:var(--glass);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
    color:white;
    font-size:15px;
}

.layout{
    display:grid;
    grid-template-columns:260px 1fr;
    gap:25px;
}

/* FILTERS */

.sidebar{
    background:var(--glass);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
    border-radius:24px;
    padding:24px;
    height:fit-content;
}

.sidebar h3{
    margin-bottom:18px;
}

.filter{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
    color:#dbe4f0;
}

.filter input{
    width:18px;
    height:18px;
}

/* CARDS */

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:24px;
}

.game-card{
    display:none;
    background:var(--glass);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
    border-radius:22px;
    overflow:hidden;
    transition:.25s;
}

.game-card.visible{
    display:block;
}

.game-card:hover{
    transform:translateY(-6px);
}

.banner-img{
    width:100%;
    height:220px;
    object-fit:cover;
    background:#111827;
    display:block;
}

.info{
    padding:20px;
}

.title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
}

.title h2{
    font-size:1.15rem;
}

.verified{
    width:24px;
    height:24px;
    border-radius:50%;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
}

.stats{
    display:flex;
    gap:15px;
    color:var(--muted);
    margin-bottom:14px;
    font-size:14px;
}

.tags{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:16px;
}

.tag{
    background:#1d4ed8;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
}

.game-id{
    color:var(--muted);
    font-size:14px;
    margin-bottom:16px;
}

.view-btn{
    width:100%;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    padding:12px;
    cursor:pointer;
    font-weight:600;
}

.view-btn:hover{
    background:#1d4ed8;
}

.empty{
    text-align:center;
    color:var(--muted);
    padding:100px 20px;
}

/* RESPONSIVE */

@media(max-width:1200px){

    .cards{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:900px){

    .layout{
        grid-template-columns:1fr;
    }

    .hero h1{
        font-size:2.7rem;
    }

}

@media(max-width:700px){

    .cards{
        grid-template-columns:1fr;
    }

}
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-links">
        <button class="nav-btn active" data-page="home">Home</button>
        <button class="nav-btn" data-page="browse">Browse</button>
    </div>
</nav>

<!-- HOME -->

<section id="home" class="page active">

    <div class="hero">
        <h1>Discover Premium Game Builds</h1>

        <p>
            Search Roblox universe IDs and browse trusted game builds.
        </p>
    </div>

</section>

<!-- BROWSE -->

<section id="browse" class="page">

<div class="browse-wrapper">

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Enter Roblox Universe ID..."
        >
    </div>

    <div class="layout">

        <aside class="sidebar">

            <h3>Filters</h3>

            <label class="filter">
                <input type="checkbox">
                Trusted
            </label>

            <label class="filter">
                <input type="checkbox">
                Most Viewed
            </label>

            <label class="filter">
                <input type="checkbox">
                Most Liked
            </label>

            <label class="filter">
                <input type="checkbox">
                Key
            </label>

            <label class="filter">
                <input type="checkbox">
                Keyless
            </label>

        </aside>

        <main>

            <div class="empty" id="emptyState">
                Search for a Roblox Universe ID.
            </div>

            <div class="cards">

                <!-- CARD 1 -->

                <div
                    class="game-card"
                    id="ringFarmCard"
                >

                    <img
                        id="gameThumbnail"
                        class="banner-img"
                        src=""
                        alt="Game Thumbnail"
                    >

                    <div class="info">

                        <div class="title">
                            <h2>Build a Ring Farm</h2>
                            <div class="verified">✓</div>
                        </div>

                        <div class="stats">
                            <span>👁 125K Views</span>
                            <span>❤️ 4.8K Likes</span>
                        </div>

                        <div class="tags">
                            <span class="tag">Trusted</span>
                            <span class="tag">Keyless</span>
                        </div>

                        <div
                            class="game-id"
                            id="gameIdText"
                        >
                            Universe ID:
                        </div>

                        <button class="view-btn">
                            View Build
                        </button>

                    </div>

                </div>

                <!-- Future cards can go here -->

            </div>

        </main>

    </div>

</div>

</section>

<script>

/* NAVIGATION */

document
.querySelectorAll('.nav-btn')
.forEach(button => {

    button.addEventListener('click', () => {

        document
        .querySelectorAll('.nav-btn')
        .forEach(btn => btn.classList.remove('active'));

        document
        .querySelectorAll('.page')
        .forEach(page => page.classList.remove('active'));

        button.classList.add('active');

        document
        .getElementById(button.dataset.page)
        .classList.add('active');

    });

});

/* SEARCH */

const searchInput =
document.getElementById('searchInput');

const card =
document.getElementById('ringFarmCard');

const thumbnail =
document.getElementById('gameThumbnail');

const empty =
document.getElementById('emptyState');

const gameIdText =
document.getElementById('gameIdText');

searchInput.addEventListener(
'input',
async () => {

    const universeId =
    searchInput.value.trim();

    if(universeId === ''){

        card.classList.remove('visible');
        empty.style.display = 'block';

        return;
    }

    try{

        const response =
        await fetch(
            `https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=512x512&format=Png&isCircular=false`
        );

        const data =
        await response.json();

        if(
            data.data &&
            data.data.length > 0 &&
            data.data[0].imageUrl
        ){

            thumbnail.src =
            data.data[0].imageUrl;

            gameIdText.textContent =
            `Universe ID: ${universeId}`;

            card.classList.add('visible');

            empty.style.display =
            'none';

        }else{

            card.classList.remove('visible');

            empty.style.display =
            'block';

        }

    }catch(error){

        console.error(error);

        card.classList.remove('visible');

        empty.style.display =
        'block';

    }

});
</script>

</body>
</html>
