<!DOCTYPE html>
<html>
<head>
    <title>Cookie Empire</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #222;
            color: white;
        }

        h1 {
            margin-top: 30px;
        }

        #cookie {
            font-size: 100px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        #cookie:active {
            transform: scale(0.9);
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .panel {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>🍪 Cookie Empire</h1>

<h2>Cookies: <span id="cookies">0</span></h2>

<div id="cookie">🍪</div>

<div class="panel">
    <button onclick="buyCursor()">
        Buy Cursor (+1/sec) Cost: <span id="cursorCost">10</span>
    </button>

    <button onclick="buyFactory()">
        Buy Factory (+10/sec) Cost: <span id="factoryCost">100</span>
    </button>
</div>

<h3>Cookies Per Second: <span id="cps">0</span></h3>

<script>
let cookies = 0;

let cursors = 0;
let factories = 0;

let cursorCost = 10;
let factoryCost = 100;

function updateUI() {
    document.getElementById("cookies").textContent = Math.floor(cookies);
    document.getElementById("cursorCost").textContent = cursorCost;
    document.getElementById("factoryCost").textContent = factoryCost;
    document.getElementById("cps").textContent =
        cursors + (factories * 10);
}

document.getElementById("cookie").onclick = function() {
    cookies++;
    updateUI();
};

function buyCursor() {
    if (cookies >= cursorCost) {
        cookies -= cursorCost;
        cursors++;

        cursorCost = Math.floor(cursorCost * 1.2);

        updateUI();
    }
}

function buyFactory() {
    if (cookies >= factoryCost) {
        cookies -= factoryCost;
        factories++;

        factoryCost = Math.floor(factoryCost * 1.4);

        updateUI();
    }
}

setInterval(() => {
    cookies += cursors;
    cookies += factories * 10;

    updateUI();
}, 1000);

updateUI();
</script>

</body>
</html>
