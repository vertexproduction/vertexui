<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter;
    background:#0b1220;
    color:white;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

@media(max-width:1000px){
    .cards{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:700px){
    .cards{grid-template-columns:1fr;}
}

.card{
    display:none;
    background:#111827;
    border:1px solid #2a3441;
    border-radius:16px;
    overflow:hidden;
    transition:.2s;
}

.card.show{
    display:block;
}

.card:hover{
    transform:translateY(-5px);
}

.thumb{
    width:100%;
    height:180px;
    object-fit:cover;
    background:#1f2937;
}

.content{
    padding:15px;
}

.search{
    padding:20px;
    text-align:center;
}

.search input{
    width:300px;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
}

.badge{
    background:#22c55e;
    display:inline-block;
    padding:3px 8px;
    border-radius:999px;
    font-size:12px;
    margin-left:6px;
}
</style>
</head>

<body>

<div class="search">
    <input id="search" placeholder="Enter Place ID (107646426076756)">
</div>

<div class="cards">

    <div class="card" id="gameCard">

        <img id="thumb" class="thumb">

        <div class="content">
            <h3>
                Build A Ring Farm
                <span class="badge">✓</span>
            </h3>

            <p>107646426076756</p>
        </div>

    </div>

</div>

<script>

const search = document.getElementById("search");
const card = document.getElementById("gameCard");
const thumb = document.getElementById("thumb");

// REAL Universe ID for your game
const universeId = "10039338037";

search.addEventListener("input", async () => {

    const value = search.value.trim();

    if(value === "107646426076756"){

        // Roblox thumbnail API (correct one)
        const url =
        `https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=512x512&format=Png&isCircular=false`;

        try{

            const res = await fetch(url);
            const data = await res.json();

            thumb.src =
            data.data[0].imageUrl;

            card.classList.add("show");

        } catch(e){
            console.log(e);
        }

    } else {
        card.classList.remove("show");
    }

});

</script>

</body>
</html>
