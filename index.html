<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --nav-active: #f0f6fc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Top Navigation Bar */
        header {
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: relative;
        }

        .logo {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
        }

        /* Top Middle Tabs */
        .tabs {
            display: flex;
            gap: 24px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .tab {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 20px 0;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .tab:hover {
            color: var(--text-main);
        }

        .tab.active {
            color: var(--nav-active);
            border-bottom-color: #f78166; /* GitHub style active line */
        }

        /* Main Content Layout */
        .container {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .page-content {
            display: none;
        }

        .page-content.active {
            display: block;
        }

        /* Browse Page Grid Layout */
        .browse-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 32px;
        }

        /* Sidebar Filters */
        .sidebar h3 {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-main);
            cursor: pointer;
        }

        .filter-item input {
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 24px;
        }

        .search-bar {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        /* Game Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-header-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            background-color: #21262d;
            border: 1px solid var(--border-color);
            object-fit: cover;
        }

        .card-title-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-blue);
            margin: 0;
        }

        .card-id {
            font-family: monospace;
            font-size: 11px;
            color: var(--text-muted);
            background: #21262d;
            padding: 2px 6px;
            border-radius: 4px;
            width: fit-content;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: auto;
        }

        .tag {
            font-size: 12px;
            background-color: #21262d;
            border: 1px solid var(--border-color);
            padding: 2px 8px;
            border-radius: 2em;
            color: var(--text-main);
        }

        .no-results {
            color: var(--text-muted);
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GitHubHub</div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab(event, 'home')">Home</div>
            <div class="tab" onclick="switchTab(event, 'browse')">Browse</div>
        </div>

        <div style="width: 60px;"></div>
    </header>

    <div class="container">
        
        <div id="home-page" class="page-content active">
            <h2>Welcome Home</h2>
            <p style="color: var(--text-muted);">Select the "Browse" tab above to explore active game builds and systems.</p>
        </div>

        <div id="browse-page" class="page-content">
            <div class="browse-layout">
                
                <aside class="sidebar">
                    <h3>Filters</h3>
                    <div class="filter-group">
                        <label class="filter-item"><input type="checkbox" checked> Trusted</label>
                        <label class="filter-item"><input type="checkbox" checked> Most Viewed</label>
                        <label class="filter-item"><input type="checkbox" checked> Most Liked</label>
                        <label class="filter-item"><input type="checkbox" checked> Key</label>
                        <label class="filter-item"><input type="checkbox" checked> Keyless</label>
                    </div>
                </aside>

                <main>
                    <div class="search-container">
                        <input type="text" id="search-bar" class="search-bar" placeholder="Search by name or ID (e.g., 107646426076756)..." oninput="filterCards()">
                    </div>

                    <div class="cards-grid" id="cards-container">
                        <div class="card" data-id="107646426076756" data-title="build a ring farm">
                            <div class="card-header-area">
                                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                <div class="card-title-group">
                                    <h4 class="card-title">Build a Ring Farm</h4>
                                    <span class="card-id">ID: 107646426076756</span>
                                </div>
                            </div>
                            <p class="card-desc">An automated build framework designed for efficient ring cultivation farming systems.</p>
                            <div class="card-tags">
                                <span class="tag">Trusted</span>
                                <span class="tag">Keyless</span>
                            </div>
                        </div>
                    </div>
                </main>

            </div>
        </div>

    </div>

    <script>
        // Tab switching logic
        function switchTab(event, tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('.page-content').forEach(page => page.classList.remove('active'));
            document.getElementById(`${tabName}-page`).classList.add('active');
        }

        // Live Search Filter & API Handler
        async function filterCards() {
            const query = document.getElementById('search-bar').value.trim().toLowerCase();
            const cards = document.querySelectorAll('.card');
            const container = document.getElementById('cards-container');
            
            const existingNoResults = document.querySelector('.no-results');
            if (existingNoResults) existingNoResults.remove();

            let visibleCount = 0;

            for (let card of cards) {
                const id = card.getAttribute('data-id');
                const title = card.getAttribute('data-title').toLowerCase();

                if (title.includes(query) || id.includes(query)) {
                    card.style.display = 'flex';
                    visibleCount++;

                    // Fire Roblox live thumbnail fetch if exact ID is provided
                    if (query === id) {
                        await fetchGameThumbnail(id, card);
                    }
                } else {
                    card.style.display = 'none';
                }
            }

            if (visibleCount === 0) {
                const noResultsDiv = document.createElement('div');
                noResultsDiv.className = 'no-results';
                noResultsDiv.innerText = 'No item found matching that name or ID.';
                container.appendChild(noResultsDiv);
            }
        }

        // Async dynamic Roblox asset fetcher via CORS proxy
        async function fetchGameThumbnail(placeId, cardElement) {
            try {
                // Phase 1: Translate Place ID to internal Roblox Universe ID
                const universeRes = await fetch(`https://corsproxy.io/?https://apis.roblox.com/universes/v1/places/${placeId}/universe`);
                const universeData = await universeRes.json();
                const universeId = universeData.universeId;

                if (universeId) {
                    // Phase 2: Query Thumbnails API using compiled Universe ID
                    const thumbRes = await fetch(`https://corsproxy.io/?https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=150x150&format=Png&isCircular=false`);
                    const thumbData = await thumbRes.json();
                    
                    if (thumbData.data && thumbData.data[0]) {
                        const imageUrl = thumbData.data[0].imageUrl;
                        
                        // Phase 3: Update DOM structure replacing default vector graphic with source image
                        let iconPlaceholder = cardElement.querySelector('.card-icon');
                        if (iconPlaceholder) {
                            if (iconPlaceholder.tagName.toLowerCase() === 'svg') {
                                const newImg = document.createElement('img');
                                newImg.className = 'card-icon';
                                newImg.src = imageUrl;
                                iconPlaceholder.parentNode.replaceChild(newImg, iconPlaceholder);
                            } else {
                                iconPlaceholder.src = imageUrl;
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("Roblox API fetch routine interrupted:", error);
            }
        }
    </script>
</body>
</html>
