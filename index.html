<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#0b1120;
    color:white;
    min-height:100vh;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#2563eb33,transparent 35%),
    radial-gradient(circle at bottom right,#7c3aed33,transparent 35%);
    z-index:-1;
}

.navbar{
    display:flex;
    justify-content:center;
    padding:18px;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,.25);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.nav-links{
    display:flex;
    gap:15px;
}

.nav-btn{
    border:none;
    background:transparent;
    color:#94a3b8;
    padding:10px 22px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.nav-btn.active{
    background:#2563eb;
    color:white;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.hero{
    text-align:center;
    padding:120px 20px;
}

.hero h1{
    font-size:4rem;
    margin-bottom:15px;
}

.hero p{
    color:#94a3b8;
}

.browse{
    max-width:1500px;
    margin:auto;
    padding:30px;
}

.search{
    max-width:700px;
    margin:0 auto 25px;
}

.search input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    color:white;
    outline:none;
}

.layout{
    display:grid;
    grid-template-columns:250px 1fr;
    gap:25px;
}

.sidebar{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    height:fit-content;
}

.sidebar h3{
    margin-bottom:15px;
}

.sidebar label{
    display:block;
    margin-bottom:12px;
    color:#cbd5e1;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:24px;
}

.card{
    display:none;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    overflow:hidden;
    transition:.25s;
}

.card.show{
    display:block;
}

.card:hover{
    transform:translateY(-5px);
}

.thumbnail{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:18px;
}

.title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.verify{
    width:22px;
    height:22px;
    background:#22c55e;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}

.stats{
    display:flex;
    gap:15px;
    color:#94a3b8;
    margin-bottom:12px;
    font-size:14px;
}

.tags{
    display:flex;
    gap:8px;
    margin-bottom:15px;
}

.tag{
    background:#2563eb;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
}

.gameid{
    color:#94a3b8;
    margin-bottom:15px;
    font-size:14px;
}

.btn{
    width:100%;
    border:none;
    background:#2563eb;
    color:white;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.empty{
    text-align:center;
    color:#94a3b8;
    padding:100px 20px;
}

@media(max-width:1200px){
    .cards{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:900px){

    .layout{
        grid-template-columns:1fr;
    }

    .hero h1{
        font-size:2.5rem;
    }
}

@media(max-width:700px){
    .cards{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-links">
        <button class="nav-btn active" data-page="home">Home</button>
        <button class="nav-btn" data-page="browse">Browse</button>
    </div>
</nav>

<section id="home" class="page active">
    <div class="hero">
        <h1>Discover Game Builds</h1>
        <p>Search trusted game builds and resources.</p>
    </div>
</section>

<section id="browse" class="page">

<div class="browse">

    <div class="search">
        <input
            id="searchInput"
            type="text"
            placeholder="Search by ID..."
        >
    </div>

    <div class="layout">

        <div class="sidebar">
            <h3>Filters</h3>

            <label><input type="checkbox"> Trusted</label>
            <label><input type="checkbox"> Most Viewed</label>
            <label><input type="checkbox"> Most Liked</label>
            <label><input type="checkbox"> Key</label>
            <label><input type="checkbox"> Keyless</label>
        </div>

        <div>

            <div class="empty" id="empty">
                Search for a game ID.
            </div>

            <div class="cards">

                <div class="card" id="ringFarmCard">

                    <img
                        class="thumbnail"
                        src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200"
                        alt="Build a Ring Farm"
                    >

                    <div class="content">

                        <div class="title">
                            <h2>Build a Ring Farm</h2>
                            <div class="verify">✓</div>
                        </div>

                        <div class="stats">
                            <span>👁 125K</span>
                            <span>❤️ 4.8K</span>
                        </div>

                        <div class="tags">
                            <span class="tag">Trusted</span>
                            <span class="tag">Keyless</span>
                        </div>

                        <div class="gameid">
                            ID: 107646426076756
                        </div>

                        <button class="btn">
                            View Build
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</section>

<script>

/* Tabs */

document.querySelectorAll('.nav-btn').forEach(btn=>{

    btn.onclick=()=>{

        document.querySelectorAll('.nav-btn')
        .forEach(x=>x.classList.remove('active'));

        document.querySelectorAll('.page')
        .forEach(x=>x.classList.remove('active'));

        btn.classList.add('active');

        document
        .getElementById(btn.dataset.page)
        .classList.add('active');

    };

});

/* Search */

const searchInput =
document.getElementById('searchInput');

const card =
document.getElementById('ringFarmCard');

const empty =
document.getElementById('empty');

searchInput.addEventListener('input',()=>{

    const value =
    searchInput.value.trim();

    if(value === '107646426076756'){

        card.classList.add('show');
        empty.style.display='none';

    }else{

        card.classList.remove('show');
        empty.style.display='block';

    }

});

</script>

</body>
</html>
