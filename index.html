<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ringtone Hub</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #ddd; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .tab-btn.active { background: #007bff; color: white; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group input { padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .ringtone-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .like-btn { background: none; border: none; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 Ringtone Hub</h2>

    <div style="margin-bottom: 30px; padding: 15px; background: #eef2f7; border-radius: 6px;">
        <h3>Add New Ringtone</h3>
        <div class="form-group">
            <label>Ringtone Name</label>
            <input type="text" id="ringtoneTitle" placeholder="e.g., Cool Retro Synth">
        </div>
        <div class="form-group">
            <label>Audio URL (MP3/MP4 or File.io link)</label>
            <input type="text" id="ringtoneUrl" placeholder="https://example.com/audio.mp3">
        </div>
        <button class="btn" onclick="addRingtone()">Upload to Database</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">All</button>
        <button class="tab-btn" onclick="switchTab('recent')">Recent</button>
        <button class="tab-btn" onclick="switchTab('liked')">Most Liked</button>
    </div>

    <audio id="audioPlayer" style="width: 100%; margin-bottom: 15px;" controls></audio>

    <div id="ringtoneList"></div>
</div>

<script>
    let allRingtones = [];
    let currentView = 'all';

    async function fetchRingtones() {
        const res = await fetch('/api/ringtones');
        allRingtones = await res.json();
        renderRingtones();
    }

    function renderRingtones() {
        const listDiv = document.getElementById('ringtoneList');
        listDiv.innerHTML = '';

        let filtered = [...allRingtones];

        // Apply Tab Filters
        if (currentView === 'recent') {
            filtered.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
        } else if (currentView === 'liked') {
            filtered.sort((a, b) => b.likes - a.likes);
        }

        filtered.forEach(rt => {
            const item = document.createElement('div');
            item.className = 'ringtone-item';
            item.innerHTML = `
                <div>
                    <strong>${rt.title}</strong>
                    <div style="font-size: 12px; color: #777;">Likes: ${rt.likes}</div>
                </div>
                <div class="controls">
                    <button class="tab-btn" onclick="playAudio('${rt.url}')">▶ Play</button>
                    <button class="like-btn" onclick="likeRingtone(${rt.id})">❤️</button>
                </div>
            `;
            listDiv.appendChild(item);
        });
    }

    function playAudio(url) {
        const player = document.getElementById('audioPlayer');
        player.src = url;
        player.play();
    }

    async function addRingtone() {
        const title = document.getElementById('ringtoneTitle').value;
        const url = document.getElementById('ringtoneUrl').value;

        const res = await fetch('/api/ringtones', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, url })
        });

        if (res.ok) {
            document.getElementById('ringtoneTitle').value = '';
            document.getElementById('ringtoneUrl').value = '';
            fetchRingtones();
        } else {
            const err = await res.json();
            alert(err.error);
        }
    }

    async function likeRingtone(id) {
        await fetch(`/api/ringtones/${id}/like`, { method: 'POST' });
        fetchRingtones();
    }

    function switchTab(tab) {
        currentView = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderRingtones();
    }

    // Initial load
    fetchRingtones();
</script>
</body>
</html>
